<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Dashboard - GitHub Issues Tracker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css">
</head>

<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white border-b border-gray-100 px-6 py-3 flex justify-between items-center sticky top-0 z-50">

        <!-- Logo -->
        <div class="flex items-center gap-2">
            <img src="assets/github-logo.png" class="w-8 h-8" alt="Logo">
            <span class="font-bold text-xl hidden sm:inline text-slate-800">
                GitHub Issues Tracker
            </span>
        </div>

        <!-- Search + New Issue -->
        <div class="flex gap-2">

            <div class="join border border-gray-200 rounded-lg overflow-hidden">

                <input
                    id="searchInput"
                    class="input input-sm join-item w-32 sm:w-64 border-none focus:outline-none"
                    placeholder="Search issues..." />

                <button
                    id="searchBtn"
                    class="btn btn-sm join-item bg-white border-none hover:bg-gray-50">
                    🔍
                </button>

            </div>

            <button class="btn btn-sm bg-indigo-600 hover:bg-indigo-700 border-none text-white px-5 rounded-lg">
                + New Issue
            </button>

        </div>

    </nav>



    <div class="max-w-7xl mx-auto px-4 mt-8">

    <!-- FILTER BUTTONS -->
    <div class="flex gap-2 mb-6">

        <button onclick="filterIssues('all', this)"
            class="tab-btn btn btn-sm px-8 bg-indigo-600 text-white active rounded-lg border-none">
            All
        </button>

        <button onclick="filterIssues('open', this)"
            class="tab-btn btn btn-sm px-8 bg-white border border-slate-200 rounded-lg text-slate-600">
            Open
        </button>

        <button onclick="filterIssues('closed', this)"
            class="tab-btn btn btn-sm px-8 bg-white border border-slate-200 rounded-lg text-slate-600">
            Closed
        </button>

    </div>

    <!-- ISSUE SUMMARY CARD -->
    <div class="bg-white p-5 rounded-xl border border-slate-200 flex justify-between items-center mb-6 shadow-sm">

        <div class="flex items-center gap-3">

            <div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
                <img src="assets/Aperture.png" class="w-6 h-6" alt="Icon">
            </div>

            <div>
                <h2 class="text-xl font-extrabold text-slate-800">
                    <span id="issueCount">0</span> Issues
                </h2>

                <p class="text-sm text-slate-400 font-medium">
                    Track and manage your project issues
                </p>
            </div>

        </div>

        <div class="flex gap-4 text-sm font-bold">

            <span class="flex items-center gap-2 text-slate-700">
                <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                Open
            </span>

            <span class="flex items-center gap-2 text-slate-700">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                Closed
            </span>

        </div>

    </div>

    <!-- LOADING SPINNER -->
    <div id="loading" class="hidden flex justify-center my-20">
        <span class="loading loading-spinner loading-lg text-indigo-600"></span>
    </div>

    <!-- ISSUE CARDS -->
    <div id="issuesContainer"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    </div>

</div>
</body>
</html>
